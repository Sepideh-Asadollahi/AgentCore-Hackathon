# Dev PostgreSQL for persisted society runs (install.sh demo profile).
name: change-society-dev-postgres
services:
  postgres:
    container_name: change-society-dev-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AGENTCORE_POSTGRES_DATABASE:-agentcore}
      POSTGRES_USER: ${AGENTCORE_POSTGRES_USER:-agentcore}
      POSTGRES_PASSWORD: ${AGENTCORE_POSTGRES_PASSWORD:-change-society-dev-local}
    ports: ["${AGENTCORE_POSTGRES_PORT:-32232}:5432"]
    volumes:
      - change-society-dev-postgres:/var/lib/postgresql/data
      - ../backend/change-society-service/migrations/0001_change_society.sql:/docker-entrypoint-initdb.d/0010_change_society.sql:ro
      - ../backend/change-society-service/migrations/0002_agent_control_plane.sql:/docker-entrypoint-initdb.d/0020_agent_control_plane.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
volumes:
  change-society-dev-postgres:
