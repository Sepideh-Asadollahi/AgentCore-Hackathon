# Integrator profile: external LangGraph Change Analyst + in-process society API
# From repository root:
#   export CHANGE_SOCIETY_WEBHOOK_AGENT_SECRET=integrator-demo-secret-change-me
#   docker compose -f hackathon/examples/external-change-analyst-worker/docker-compose.integrator.yml up --build

services:
  change-analyst-worker:
    build:
      context: ../../..
      dockerfile: hackathon/examples/external-change-analyst-worker/Dockerfile
    environment:
      AGENTCORE_WEBHOOK_SHARED_SECRET: ${CHANGE_SOCIETY_WEBHOOK_AGENT_SECRET:-integrator-demo-secret-change-me}
      WORKER_PORT: "32510"
      WORKER_USE_LLM: "0"
    ports:
      - "32510:32510"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:32510/ready')"]
      interval: 5s
      timeout: 3s
      retries: 10

